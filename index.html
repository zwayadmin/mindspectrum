<!-- ════════════════════════════════════════════════════════
     SubmitQueue v1.1 — 心智光譜提交排隊模組
     v1.1 修正：
       - localStorage 容量保護（最多 50 筆）
       - setConcurrency() 真的可動態調整
       - 失敗到底時保留 localStorage（下次開頁可重試）
     用法：把 fetch(URL, ...) 換成 SubmitQueue.add(URL, payload)
     ════════════════════════════════════════════════════════ -->
<script>
const SubmitQueue = (() => {
  let CONCURRENCY     = 2;        // 同時最多幾個請求（可由 setConcurrency 動態調整）
  const MAX_RETRIES   = 3;
  const BASE_DELAY_MS = 1500;
  const MAX_PERSIST   = 50;       // localStorage 最多保留筆數
  const STORAGE_KEY   = 'msq_pending';

  let queue = [];
  let running = 0;
  let online = navigator.onLine;

  const callbacks = {
    onSuccess: (uid) => console.log('[Queue] OK uid:', uid),
    onFail:    (uid, err) => console.warn('[Queue] FAIL uid:', uid, err),
    onRetry:   (uid, n)  => console.log('[Queue] retry uid:', uid, '#', n),
    onQueued:  (uid, len) => console.log('[Queue] queued uid:', uid, 'q=', len),
  };

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function execute(task) {
    running++;
    let attempt = 0;
    while (attempt <= MAX_RETRIES) {
      try {
        await fetch(task.url, {
          method:  'POST',
          mode:    'no-cors',
          cache:   'no-cache',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body:    JSON.stringify(task.payload),
        });
        // no-cors 拿不到 status，能 resolve 就視為成功
        removePersisted(task.uid);
        callbacks.onSuccess(task.uid);
        break;
      } catch (err) {
        attempt++;
        if (attempt > MAX_RETRIES) {
          // v1.1：失敗到底保留 localStorage，下次開頁再試
          callbacks.onFail(task.uid, err.message);
          break;
        }
        callbacks.onRetry(task.uid, attempt);
        await sleep(BASE_DELAY_MS * Math.pow(2, attempt - 1));
      }
    }
    running--;
    next();
  }

  function next() {
    if (!online) return;
    while (running < CONCURRENCY && queue.length > 0) {
      execute(queue.shift());
    }
  }

  function persist(task) {
    try {
      const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      stored.push(task);
      // v1.1：超過 MAX_PERSIST 就丟最舊的，避免 localStorage 爆
      while (stored.length > MAX_PERSIST) stored.shift();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));
    } catch (_) {}
  }

  function removePersisted(uid) {
    try {
      const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stored.filter(t => t.uid !== uid)));
    } catch (_) {}
  }

  function loadPersisted() {
    try {
      const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      if (stored.length > 0) {
        console.log('[Queue] load persisted:', stored.length);
        stored.forEach(t => queue.push(t));
        next();
      }
    } catch (_) {}
  }

  window.addEventListener('online',  () => { online = true;  console.log('[Queue] online');  next(); });
  window.addEventListener('offline', () => { online = false; console.log('[Queue] offline'); });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPersisted);
  } else {
    loadPersisted();
  }

  return {
    add(url, payload) {
      const uid = payload.uid || ('msq_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7));
      const task = {
        uid,
        url,
        payload: { ...payload, uid, submittedAt: payload.submittedAt || new Date().toISOString() },
        addedAt: Date.now(),
      };
      persist(task);
      queue.push(task);
      callbacks.onQueued(uid, queue.length);
      next();
      return uid;
    },
    status() { return { queued: queue.length, running, online, concurrency: CONCURRENCY }; },
    on(event, fn) { if (callbacks[event] !== undefined) callbacks[event] = fn; return this; },
    // v1.1：真的可調整並發數，且立刻嘗試填滿
    setConcurrency(n) {
      if (typeof n === 'number' && n >= 1) {
        CONCURRENCY = n;
        next();
      }
      return this;
    },
  };
})();
</script>

/* ── Score bar (light bg) ── */
function ScoreBar({ label, score, color }) {
    return (
        <div style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:600,color:'var(--text-mid)',marginBottom:5}}>
                <span>{label}</span>
                <span style={{fontVariantNumeric:'tabular-nums',fontWeight:700,color:'var(--text-dark)'}}>{score}</span>
            </div>
            <div style={{height:10,background:'var(--border)',borderRadius:6,overflow:'hidden'}}>
                <div style={{height:'100%',background:color,width:`${(score/30)*100}%`,borderRadius:6,transition:'width 1s ease-out'}}/>
            </div>
        </div>
    );
}

function PairMatcher({ parentKey, accentColor, borderColor, bgColor }) {

    const [pairOpen, setPairOpen] = React.useState(false);

/* ── 孩子端 → 家長端的色票名稱對應 ──

   PAIR_DATA 是 red/orange/green/blue（光譜色命名），需要映射。 */
const KID_TYPE_TO_COLOR = { fire:'red', electric:'orange', grass:'green', water:'blue' };

/* ── 孩子版的「親子底色配對」彈窗 ──

   讓孩子選爸媽的底色 → 用 PAIR_DATA[parent-child] 找配對 → 顯示給家長看的建議。 */
function ChildPairModal({ childCategory, onClose }) {
    const [parentColor, setParentColor] = React.useState(null);
    const pairKey = parentColor && childCategory ? `${parentColor}-${childCategory}` : null;
    const pairResult = pairKey ? PAIR_DATA[pairKey] : null;
    const colorBtns = [
        { id:'red',    label:'紅色家長', color:'#D63030', bg:'#FFF0F0' },
        { id:'orange', label:'橙色家長', color:'#E8600A', bg:'#FFF0E6' },
        { id:'green',  label:'綠色家長', color:'#2E8B5A', bg:'#F0FAF4' },
        { id:'blue',   label:'藍色家長', color:'#3A70B0', bg:'#EEF4FF' },
    ];
    return (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 animate-pop-in">
            <div className="bg-white border-4 border-black p-6 rounded-xl max-w-sm w-full relative" style={{maxHeight:'90vh',overflowY:'auto'}}>
                <button onClick={onClose} className="absolute top-2 right-3 text-gray-500 hover:text-black font-bold text-xl leading-none">✕</button>
                <h3 className="text-xl font-black text-purple-700 mb-1 text-center">親子底色配對</h3>
                <p className="text-xs text-center text-gray-500 mb-4">選家長是哪種顏色，看你們的相處建議</p>

                <div className="bg-yellow-50 border-2 border-yellow-300 rounded-lg p-2 mb-4 text-center">
                    <span className="text-xs font-bold text-yellow-800">你的底色：</span>
                    <span className="text-sm font-black ml-1" style={{color:({red:'#D63030',orange:'#E8600A',green:'#2E8B5A',blue:'#3A70B0'})[childCategory]}}>
                        {({red:'紅色',orange:'橙色',green:'綠色',blue:'藍色'})[childCategory]}
                    </span>
                </div>

                <div className="text-sm font-bold text-gray-700 mb-2 text-center">家長是哪種顏色？</div>
                <div className="grid grid-cols-2 gap-2 mb-4">
                    {colorBtns.map(c => (
                        <button key={c.id} onClick={()=>setParentColor(c.id)}
                            className="py-3 px-2 font-bold text-sm border-4 transition-all flex items-center justify-center gap-1.5"
                            style={{
                                borderColor: parentColor===c.id ? c.color : '#D1D5DB',
                                background: parentColor===c.id ? c.bg : '#F9FAFB',
                                color: parentColor===c.id ? c.color : '#6B7280',
                            }}>
                            <span style={{width:11,height:11,borderRadius:'50%',background:c.color,display:'inline-block'}}/>
                            {c.label}
                        </button>
                    ))}
                </div>

                {pairResult && (
                    <div className="bg-purple-50 border-2 border-purple-300 rounded-lg p-4 mb-4 animate-pop-in">
                        <div className="text-sm font-black text-purple-900 mb-2">{pairResult.title}</div>
                        <div className="text-sm font-bold text-purple-700 mb-3 leading-relaxed">「{pairResult.headline}」</div>
                        <div className="text-sm text-gray-700 leading-relaxed mb-3">{pairResult.body}</div>
                        <div className="bg-white border-l-4 border-purple-500 p-3 rounded">
                            <div className="text-xs font-black text-purple-600 mb-1 tracking-widest">★ 給家長的建議</div>
                            <div className="text-sm text-gray-800 leading-relaxed font-medium">{pairResult.tip}</div>
                        </div>
                    </div>
                )}

                <button onClick={onClose} className="w-full bg-gray-800 text-white font-bold py-3 rounded-lg active:bg-black border-4 border-gray-600">
                    我知道了！
                </button>
            </div>
        </div>
    );
}

/* ── Desktop detection (stable, computed once) ── */
const isDesktop = window.innerWidth >= 768;

/* ── Shell (defined outside App to keep identity stable) ── */
function Shell({children}) {
    if (!isDesktop) return (
        <div className="page fade-up">
            {children}
        </div>
    );
    return (
        <div className="page">
            <div className="phone-shell">
                <div className="phone-content no-bar">{children}</div>
            </div>
        </div>
    );
}

const renderZhuyinBlock = (zhuyinHtml) => {
  const regex = /<ruby>(.*?)<rt>(.*?)<\/rt><\/ruby>|([^<]+)/g;
  let match;
  const parts = [];
  while ((match = regex.exec(zhuyinHtml)) !== null) {
    if (match[1]) {
      const char = match[1];
      let fullZhuyin = match[2];
      let lightTone = '';
      let tone = '';
      let symbols = fullZhuyin;
      if (fullZhuyin.startsWith('˙')) {
        lightTone = '˙';
        symbols = fullZhuyin.substring(1);
      } else {
        const lastChar = fullZhuyin.slice(-1);
        if (['ˊ', 'ˇ', 'ˋ'].includes(lastChar)) {
          tone = lastChar;
          symbols = fullZhuyin.slice(0, -1);
        }
      }
      const symbolList = symbols.split('');
      parts.push(
        <span key={parts.length} className="zhuyin-char-block">
          <span className="zhuyin-main-char">{char}</span>
          <span className="zhuyin-phonetic-col">
            {lightTone && <span className="zhuyin-light-tone">{lightTone}</span>}
            {symbolList.map((s, idx) => (<span key={idx} className="zhuyin-symbol">{s}</span>))}
            {tone && <span className="zhuyin-tone">{tone}</span>}
          </span>
        </span>
      );
    } else if (match[0]) {
      const chars = match[0].split('');
      chars.forEach(char => {
        if (char.trim() === '') return;
        parts.push(
          <span key={parts.length} className="zhuyin-punct-block">
            <span className="zhuyin-punct-char">{char}</span>
          </span>
        );
      });
    }
  }
  return parts;
};

const Typewriter = ({ text, speed = 40, isTyping, onComplete }) => {
  const [displayLen, setDisplayLen] = useState(0);
  useEffect(() => setDisplayLen(0), [text]);
  useEffect(() => {
    if (!isTyping) { setDisplayLen(text.length); return; }
    if (displayLen < text.length) {
      const timer = setTimeout(() => setDisplayLen(prev => prev + 1), speed);
      return () => clearTimeout(timer);
    } else { if (isTyping && onComplete) onComplete(); }
  }, [displayLen, isTyping, text, speed, onComplete]);
  return <span>{text.substring(0, displayLen)}</span>;
};

            const txt = await res.text();
            let data;
            try { data = JSON.parse(txt); } catch(pe) { throw new Error('後端回應格式異常'); }
            if (data && data.error) { setLookResult({ error: data.error }); return; }
            if (!Array.isArray(data) || data.length === 0) { setLookResult({ error: 'not found' }); return; }
            const sortedRecords = [...data].sort((a, b) => (b.date||'').localeCompare(a.date||''));
            setLookResult({ records: sortedRecords });

                     onClick={()=>{setShowEng(false);setEngPwd('');}}>
                    <div className="card pop-in" style={{maxWidth:300,width:'100%',padding:28}} onClick={e=>e.stopPropagation()}>

    );

    /* ─────────── QUIZ ─────────── */
    if (step==='quiz') return (

            <div style={{background:'var(--card)',height:'100vh',width:'100%',display:'flex',flexDirection:'column'}}>

                                <div style={{width:6,height:13,background:'var(--orange)',borderRadius:'3px 3px 0 0'}}/>

                            </div>
                            <div style={{marginLeft:'auto',fontSize:13,fontWeight:700,color:'#6366F1',fontFamily:'monospace'}}>{qIdx+1} / {QUESTIONS.length}</div>
                        </div>
                        {/* Progress bar — 緊接在 logo 下方 */}
                        <div style={{height:10,background:'var(--border)',overflow:'hidden',margin:'0 -24px'}}>
                            <div style={{height:'100%',background:'#6366F1',width:`${progress}%`,transition:'width 0.3s ease'}}/>
                        </div>
                    </div>
                </div>

                {/* Question + Options */}
                <div style={{flex:1,width:'100%',maxWidth:480,margin:'0 auto',overflowY:'auto'}} className="no-bar">
                  <div style={{minHeight:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-start',paddingTop:'clamp(4px,3vh,14px)'}}>
                    {/* Question card */}
                    <div className={navDir==='back' ? 'slide-in-back' : 'slide-in'} key={`q-${qIdx}-${navDir}`} style={{background:'var(--card)',padding:'16px 20px 0'}}>
                        <div style={{fontSize:25,fontWeight:700,color:'var(--text-dark)',lineHeight:1.55,paddingBottom:12,paddingTop:4,borderBottom:'2px solid var(--border)',minHeight:'clamp(80px,14vh,120px)',width:'100%',boxSizing:'border-box',textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center'}}>

                        </div>
                        <div style={{fontSize:11,color:'var(--text-light)',padding:'6px 0 4px',textAlign:'center'}}>請選擇最符合您真實狀況的選項</div>

                    {/* Options — table-row style */}
                    <div style={{background:'var(--card)',paddingBottom:8}}>
                        {OPTIONS.map((o,i)=>{

                            const selected = answers[qIdx+1] === o.score;
                            return (
                                <button key={o.score}
                                    className={`option-btn ${navDir==='back'?'slide-in-back':'slide-in'}`}

                                        borderBottom:'1px solid var(--border)',
                                        padding:'14px 13px 14px 13px',
                                        marginBottom:0,
                                        display:'flex',alignItems:'center',gap:12,
                                        background: selected ? 'var(--accent-pale)' : 'var(--card)',
                                        transition:'background 0.15s'

                                    <span style={{
                                        width:28,height:28,
                                        background: selected ? 'var(--accent)' : 'var(--accent-pale)',
                                        border: selected ? 'none' : '1px solid var(--border)',
                                        borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',
                                        fontSize:12,fontWeight:800,
                                        color: selected ? '#fff' : 'var(--accent)',

                    {qIdx>0 && (

            </div>

    );



    /* ─────────── RESULT ─────────── */
    if (step==='result') {
        const s = sortedTypes();
        const domId   = s[0]?.id || 'blue';
        const domInfo = TYPE_INFO[domId];
        const dynStyle = {
            '--accent':      domInfo.barColor,
            '--accent-dark': domInfo.darkColor,
            '--accent-pale': domInfo.bgColor,
            '--border':      domInfo.borderColor,
        };
        return (
            <Shell>
              <div style={dynStyle}>
                <div className="top-header" style={{paddingBottom:32, background: domInfo.bgColor, borderBottom:`1px solid ${domInfo.borderColor}`}}>

                    <div style={{position:'absolute',top:0,left:0,width:'100%',height:6,background:`linear-gradient(90deg,${TYPE_INFO.red.barColor},${TYPE_INFO.orange.barColor},${TYPE_INFO.green.barColor},${TYPE_INFO.blue.barColor})`}}/>

                        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:8}}>

                            <ScoreBar label="協調型（綠）" score={scores.green}  color="var(--green)"/>
                            <ScoreBar label="分析型（藍）" score={scores.blue}   color="var(--blue)"/>
                        </div>
                    </> : <>

                            <div style={{display:'flex',alignItems:'flex-end',gap:3}}>
                                <div style={{width:5,height:14,background:'var(--red)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:9,background:'var(--orange)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:18,background:'var(--green)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:12,background:'var(--blue)',borderRadius:'2px 2px 0 0'}}/>
                            </div>
                            <div style={{fontSize:11,letterSpacing:'2px',color:domInfo.barColor,fontWeight:700,textTransform:'uppercase'}}>領取成功</div>
                        </div>
                        <div style={{fontSize:26,fontWeight:900,color:'var(--text-dark)',marginBottom:6}}>心智光譜說明</div>
                        <div style={{fontSize:13,color:'var(--text-mid)'}}>說明已寄至 {email}</div>
                    </>}
                </div>

                <div className="content">
                    {/* Type info sections */}
                    {mode==='quiz' && info && (
                        <div style={{marginBottom:16}}>
                            <div className="type-section" style={{borderLeftColor:'var(--red)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--red)',letterSpacing:1.5,marginBottom:7,textTransform:'uppercase'}}>壓力下的表現</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.75}}>{info.stress}</div>
                            </div>
                            <div className="type-section" style={{borderLeftColor:'var(--blue)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',letterSpacing:1.5,marginBottom:7,textTransform:'uppercase'}}>您的優勢</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.75}}>{info.strength}</div>
                            </div>
                            <div className="type-section" style={{borderLeftColor:'var(--green)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--green)',letterSpacing:1.5,marginBottom:7,textTransform:'uppercase'}}>覺知練習</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.75}}>{info.practice}</div>
                            </div>
                        </div>
                    )}

                    {/* 分齡建議 */}
                    {mode==='quiz' && childAge && AGE_TIPS[childAge] && (
                        <div className="card fade-up" style={{padding:'22px',marginBottom:16,borderTop:'3px solid var(--accent)'}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                                <div style={{width:32,height:32,background:'var(--accent-pale)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2.2" strokeLinecap="round"><path d="M12 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/><path d="M19 21v-2a7 7 0 0 0-14 0v2"/></svg>
                                </div>
                                <div>
                                    <div style={{fontSize:13,fontWeight:900,color:'var(--text-dark)'}}>
                                        {AGE_GROUPS.find(a=>a.key===childAge)?.label} 適齡練習

                                    <div style={{fontSize:11,color:'var(--accent)',fontWeight:700}}>

                                            {i+1}
                                        </div>
                                        <div style={{fontSize:13,color:'var(--text-dark)',lineHeight:1.7}}>{tip}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                    {mode==='direct' && (
                        <div className="card" style={{textAlign:'center',padding:'28px 22px',marginBottom:16}}>
                            <div style={{width:56,height:56,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1.5px solid var(--border)'}}>
                                <Ico.Inbox/>
                            </div>
                            <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>說明已寄出！</div>
                            <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.8}}>
                                請至 <span style={{fontWeight:800,color:'var(--charcoal)'}}>{email}</span> 查收<br/>

                            </div>

                    {/* LINE */}
                    <a href={LINE_ADD_FRIEND_URL} target="_blank" rel="noopener noreferrer"

                    {/* 帶孩子測驗 */}

                    </button>

                    {/* 親子底色配對 */}
                    <PairMatcher parentKey={domId} accentColor={domInfo.barColor} borderColor={domInfo.borderColor} bgColor={domInfo.bgColor}/>

                    {/* 分享成果 */}
                    {(()=>{
                        const shareUrl  = name ? `${QUIZ_SHARE_URL}?ref=${encodeURIComponent(name)}` : QUIZ_SHARE_URL;
                        const shareText = `我是「${domInfo.label}」家長！\n在教養壓力下，我的直覺反應揭露了我的底色。\n你是哪種底色的家長？快來測測看！\n${shareUrl}`;
                        const lineUrl   = `https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`;
                        const doCopy = async () => {
                            try { await navigator.clipboard.writeText(shareUrl); setCopied(true); setTimeout(()=>setCopied(false),2000); }
                            catch(e) {}
                        };
                        return (
                            <div style={{marginBottom:10}}>
                                {/* 平台快捷列 */}
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                    {/* LINE */}
                                    <a href={lineUrl} target="_blank" rel="noopener noreferrer"
                                        style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,padding:'14px 4px',background:'#06C755',borderRadius:14,textDecoration:'none',color:'#fff',boxShadow:'0 3px 10px rgba(6,199,85,0.30)'}}>
                                        <Ico.Line/>
                                        <span style={{fontSize:11,fontWeight:700}}>LINE 分享</span>
                                    </a>
                                    {/* 複製連結 */}
                                    <button onClick={doCopy}
                                        style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,padding:'14px 4px',background:copied?'#2E8B5A':'var(--surface)',borderRadius:14,border:`1.5px solid ${copied?'#2E8B5A':'var(--border-mid)'}`,cursor:'pointer',transition:'all 0.2s',color:copied?'#fff':'var(--text-dark)',boxShadow:copied?'0 3px 10px rgba(46,139,90,0.28)':'0 1px 4px rgba(99,102,241,0.08)'}}>
                                        {copied ? <Ico.Check/> : <Ico.Copy/>}
                                        <span style={{fontSize:11,fontWeight:700}}>{copied?'已複製':'複製連結'}</span>
                                    </button>
                                </div>
                            </div>
                        );
                    })()}

                    {/* v7.17：移除「截圖保存」按鈕（依設計需求） */}

                    <button onClick={reset} className="btn-ghost">
                        <Ico.Restart/> 重新開始
                    </button>

                    {/* 品牌 LOGO footer */}
                    <div style={{textAlign:'center',marginTop:12,paddingTop:16,borderTop:'1px solid var(--border)'}}>
                        <img
                            src="https://i.ibb.co/4RTWqrWB/LOGO-1.jpg"
                            alt="台灣展威文化教育"
                            style={{height:28,width:'auto',maxWidth:'60%',objectFit:'contain',opacity:0.75,display:'block',margin:'0 auto'}}
                        />
                    </div>
                </div>

                {/* Screenshot hint modal */}
                {showSS && (
                    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                         onClick={()=>setShowSS(false)}>
                        <div className="card pop-in" style={{maxWidth:300,width:'100%',padding:'32px 24px',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                            <div style={{width:56,height:56,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1.5px solid var(--border)'}}>
                                <Ico.Camera/>
                            </div>
                            <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>請截圖保存</div>
                            <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.75,marginBottom:22}}>
                                請使用手機截圖功能，<br/>保存您的測驗結果。
                            </div>
                            <button onClick={()=>setShowSS(false)} className="btn-primary">我知道了</button>
                        </div>
                    </div>
                )}
              </div>{/* end dynStyle wrapper */}
            </Shell>
        );
    }

    /* ─────────── LOOKUP ─────────── */
    if (step==='lookup') return (
        <Shell>
            <div className="top-header">
                <SpectrumStrip/>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:10}}>
                    <div style={{display:'flex',alignItems:'flex-end',gap:3}}>
                        <div style={{width:5,height:14,background:'var(--red)',borderRadius:'2px 2px 0 0'}}/>
                        <div style={{width:5,height:9,background:'var(--orange)',borderRadius:'2px 2px 0 0'}}/>
                        <div style={{width:5,height:18,background:'var(--green)',borderRadius:'2px 2px 0 0'}}/>
                        <div style={{width:5,height:12,background:'var(--blue)',borderRadius:'2px 2px 0 0'}}/>
                    </div>
                    <div style={{fontSize:11,letterSpacing:'2px',color:'var(--accent)',fontWeight:700,textTransform:'uppercase'}}>歷史紀錄查詢</div>
                </div>
                <div style={{fontSize:26,fontWeight:900,color:'var(--text-dark)',marginBottom:8}}>查詢過往測驗紀錄</div>
                <div style={{fontSize:13,color:'var(--text-mid)',lineHeight:1.6}}>請填寫當時測驗所填的資料</div>
            </div>

            <div className="content">
                {/* Step 1: Choose identity */}
                {!lookWho && lookResult === null && (
                    <div style={{marginBottom:16}}>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--text-mid)',marginBottom:14,textAlign:'center'}}>請選擇您要查詢哪一筆紀錄</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                            <button onClick={()=>setLookWho('adult')} className="identity-card" style={{
                                padding:'24px 12px',borderRadius:20,border:'1.5px solid var(--border)',
                                background:'var(--card)',cursor:'pointer',textAlign:'center',transition:'all 0.15s',
                                boxShadow:'0 2px 10px rgba(45,45,45,0.06)'
                            }}>
                                <div style={{width:56,height:56,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1.5px solid var(--border)',color:'var(--text-dark)'}}>
                                    <Ico.PersonAdult/>
                                </div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--text-dark)',marginBottom:4}}>家長紀錄</div>
                                <div style={{fontSize:11,color:'var(--text-light)'}}>以 Email 查詢</div>
                            </button>
                            <button onClick={()=>setLookWho('child')} className="identity-card" style={{
                                padding:'24px 12px',borderRadius:20,border:'1.5px solid var(--border)',
                                background:'var(--card)',cursor:'pointer',textAlign:'center',transition:'all 0.15s',
                                boxShadow:'0 2px 10px rgba(45,45,45,0.06)'
                            }}>
                                <div style={{width:56,height:56,background:'#F0FAF4',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1.5px solid rgba(46,139,90,0.2)',color:'#2E8B5A'}}>
                                    <Ico.PersonChild/>
                                </div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--text-dark)',marginBottom:4}}>孩子紀錄</div>
                                <div style={{fontSize:11,color:'var(--text-light)'}}>以暱稱查詢</div>
                            </button>
                        </div>
                    </div>
                )}

                {/* Step 2: Fill in form */}
                {lookWho && (lookResult === null || lookResult === 'loading') && (
                    <div className="card" style={{padding:'24px 22px'}}>
                        {/* Identity header */}
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
                            <div style={{width:36,height:36,borderRadius:'50%',background:lookWho==='adult'?'var(--surface)':'var(--green-pale)',display:'flex',alignItems:'center',justifyContent:'center',border:lookWho==='adult'?'1.5px solid var(--border)':'1.5px solid rgba(30,132,73,0.2)',color:lookWho==='adult'?'var(--text-dark)':'var(--green)',flexShrink:0}}>
                                {lookWho==='adult' ? <Ico.PersonAdult/> : <Ico.PersonChild/>}
                            </div>
                            <div>
                                <div style={{fontSize:14,fontWeight:800,color:'var(--text-dark)'}}>{lookWho==='adult'?'家長版紀錄':'孩子版紀錄'}</div>
                                <button onClick={()=>{setLookWho(null);setLookErr('');setLookResult(null);setLookNick('');setLookEmail('');setLookChild('');}}
                                    style={{fontSize:11,color:'var(--text-light)',background:'none',border:'none',cursor:'pointer',padding:0,marginTop:2}}>
                                    切換身份 →
                                </button>
                            </div>
                        </div>

                        {/* Nickname */}
                        <div style={{marginBottom:14}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:7}}>當時填寫的暱稱</label>
                            <div className="input-wrap">
                                <span className="input-icon"><Ico.User/></span>
                                <input type="text" className="input-field" placeholder="例如：王小明"
                                    value={lookNick} onChange={e=>setLookNick(e.target.value)}/>
                            </div>
                        </div>

                        {/* Email / Child email */}
                        {lookWho==='adult' ? (
                            <div style={{marginBottom:22}}>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:7}}>
                                    家長 Email
                                    <span style={{fontSize:11,fontWeight:400,color:'var(--text-light)',marginLeft:4}}>（當時填寫的信箱）</span>
                                </label>
                                <div className="input-wrap">
                                    <span className="input-icon"><Ico.Mail/></span>
                                    <input type="email" className="input-field" placeholder="example@mail.com"
                                        value={lookEmail} onChange={e=>setLookEmail(e.target.value)}/>
                                </div>
                            </div>
                        ) : (
                            <div style={{background:'var(--surface)',borderRadius:12,padding:'12px 14px',marginBottom:22,border:'1px solid var(--border)'}}>
                                <div style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'flex',alignItems:'center',gap:6}}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                                    孩子版紀錄只需填寫暱稱即可查詢
                                </div>
                            </div>
                        )}

                        {lookErr && (
                            <div style={{fontSize:12,color:'#D63030',marginBottom:12,fontWeight:600,padding:'10px 12px',background:'#FFF5F5',borderRadius:10,border:'1px solid #FECACA',display:'flex',alignItems:'center',gap:6}}>
                                <Ico.Warning/> {lookErr}
                            </div>
                        )}

                        <button className="btn-primary" onClick={doLookup} disabled={lookResult==='loading'}
                            style={{opacity:lookResult==='loading'?0.7:1}}>
                            {lookResult==='loading'
                                ? <><span style={{display:'inline-block',width:16,height:16,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/> 查詢中…</>
                                : <><Ico.Search/> 立即查詢紀錄</>}
                        </button>
                    </div>
                )}

                {/* Error / Not found */}
                {lookResult && lookResult !== 'loading' && lookResult.error && (
                    <div className="card" style={{padding:'28px 22px',textAlign:'center'}}>
                        <div style={{width:64,height:64,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1.5px solid var(--border)',color:'var(--text-light)'}}>
                            <Ico.SearchOff/>
                        </div>
                        <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>查無紀錄</div>
                        <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.75,marginBottom:22,whiteSpace:'pre-line'}}>
                            {lookResult.error === 'missing parameters' || lookResult.error === 'not found'
                                ? '找不到符合的測驗紀錄，\n請確認填寫的資料是否正確。'
                                : lookResult.error}
                        </div>
                        <button className="btn-outline" onClick={()=>setLookResult(null)}>重新查詢</button>
                    </div>
                )}

                {/* Success result — array of records */}
                {lookResult && lookResult !== 'loading' && lookResult.records && (
                    <div>
                        {/* Header */}
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,padding:'14px 16px',background:'var(--green-pale)',borderRadius:16,border:'1.5px solid #9BE3BF'}}>
                            <div style={{width:32,height:32,background:'var(--green)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                            <div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--green)'}}>找到 {lookResult.records.length} 筆紀錄</div>
                                <div style={{fontSize:11,color:'var(--green)',opacity:0.7,marginTop:1}}>依時間由新到舊排列</div>
                            </div>
                        </div>

                        {/* Each record */}
                        {lookResult.records.map((r, i) => {
                            const sc = {
                                red:    Number(r.scores?.red    ?? r.red    ?? 0),
                                orange: Number(r.scores?.orange ?? r.orange ?? 0),
                                green:  Number(r.scores?.green  ?? r.green  ?? 0),
                                blue:   Number(r.scores?.blue   ?? r.blue   ?? 0),
                            };
                            const domId = Object.entries(sc).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'blue';
                            const typeLabel = {red:'開創型（紅）', orange:'關懷型（橙）', green:'協調型（綠）', blue:'分析型（藍）'};
                            const typeColor = {red:'#D63030', orange:'#E8600A', green:'#2E8B5A', blue:'#3A70B0'};
                            const typeBg    = {red:'#FFF0F0', orange:'#FFF0E6', green:'#F0FAF4', blue:'#EEF4FF'};
                            return (
                                <div key={i} className="card" style={{marginBottom:12,padding:'20px',borderTop:`3px solid ${typeColor[domId]}`}}>
                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                                        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:typeBg[domId],borderRadius:20,padding:'4px 12px'}}>
                                            <div style={{width:8,height:8,borderRadius:'50%',background:typeColor[domId]}}/>
                                            <span style={{fontSize:12,fontWeight:800,color:typeColor[domId]}}>{typeLabel[domId]}</span>
                                        </div>
                                        <div style={{fontSize:11,color:'var(--text-light)',fontWeight:600}}>{r.date || '—'}</div>
                                    </div>
                                    {[
                                        {key:'red',   label:'開創型（紅）', color:'#D63030'},
                                        {key:'orange',label:'關懷型（橙）', color:'#E8600A'},
                                        {key:'green', label:'協調型（綠）', color:'#2E8B5A'},
                                        {key:'blue',  label:'分析型（藍）', color:'#3A70B0'},
                                    ].map(t=>(
                                        <div key={t.key} style={{marginBottom:9}}>
                                            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:700,color:'var(--text-dark)',marginBottom:4}}>
                                                <span>{t.label}</span>
                                                <span style={{color:t.color,fontVariantNumeric:'tabular-nums'}}>{sc[t.key]}</span>
                                            </div>
                                            <div style={{height:5,background:'var(--surface)',borderRadius:4,overflow:'hidden',border:'1px solid var(--border)'}}>
                                                <div style={{height:'100%',background:t.color,width:`${(sc[t.key]/30)*100}%`,borderRadius:4,transition:'width 1s ease-out'}}/>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}

                        <button className="btn-outline" onClick={()=>{setLookResult(null);setLookWho(null);setLookNick('');setLookEmail('');setLookChild('');}} style={{marginBottom:8}}>
                            再查一筆
                        </button>
                    </div>
                )}

                <button onClick={reset} className="btn-ghost"><Ico.ChevronL/> 返回首頁</button>
            </div>

            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </Shell>
    );

    return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
