            100% { transform: scale(1); opacity: 1; }

            from { opacity: 0; transform: translateX(16px); }

        /* ── Layout ──────────────────────── */
        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--surface);
        }

        /* ── Top Header ──────────────────── */
        .top-header {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
            padding: 40px 24px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .top-header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }
        .top-header::after {
            content: '';
            position: absolute;
            bottom: -30px; left: -20px;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(232,96,10,0.08);
        }
        .spectrum-strip {
            display: flex;
            height: 3px;
            margin: 16px auto 0;
            max-width: 120px;
            border-radius: 2px;
            overflow: hidden;
            gap: 2px;
        }

        /* ── Content ─────────────────────── */
        .content {
            width: 100%;
            max-width: 480px;
            padding: 20px 18px 48px;
            flex: 1;
        }

        /* ── Cards ───────────────────────── */
        .card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--surface2);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(26,39,64,0.06);
        }
        .card-accent {
            background: var(--white);
            border-radius: 16px;
            border: 1.5px solid var(--accent-pale);
            padding: 20px;
            margin-bottom: 12px;
        }

        /* ── Buttons ─────────────────────── */
        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.16s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }
        .btn-primary:active { transform: scale(0.97); background: #C05008; }

        .btn-secondary {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.16s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:active { transform: scale(0.97); background: #0E1929; }

        .btn-outline {
            width: 100%;
            background: transparent;
            color: var(--text-mid);
            border: 1.5px solid var(--surface2);
            border-radius: 14px;
            padding: 13px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .btn-outline:active { background: var(--surface); }

        .btn-ghost {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-light);
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

            width: 100%;
            padding: 13px 14px 13px 44px;
            font-size: 15px;
            background: var(--surface);
            border: 1.5px solid var(--surface2);
            border-radius: 12px;
            outline: none;
            color: var(--text-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;

            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,96,10,0.1);

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

            border-radius: 18px;
            border: 1px solid var(--surface2);
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            transition: all 0.18s;

            background: var(--white);
            border: 1.5px solid var(--surface2);
            border-radius: 14px;
            padding: 15px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 10px;
            box-shadow: 0 1px 3px rgba(26,39,64,0.06);

            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);

            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            background: var(--accent-pale);
            color: var(--accent);
        }

        /* ── Divider ─────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--surface2);
        }

        @media (min-width: 768px) {
            body { background: var(--primary); }

            .page {
                min-height: 100vh;
                background: var(--primary);
                justify-content: center;
                align-items: center;
                padding: 24px;

            .phone-shell {
                width: 100%;
                max-width: 520px;
                background: var(--surface);
                border-radius: 32px;
                overflow: hidden;
                box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);

            .top-header { padding: 48px 32px 40px; }

            .top-header .title-main  { font-size: 34px !important; }
            .top-header .title-sub   { font-size: 16px !important; }

            .entry-card { padding: 24px; }

            .entry-card .entry-sub   { font-size: 14px !important; }

            .option-btn .opt-badge { font-size: 14px !important; padding: 4px 14px !important; }

            .content { padding: 24px 24px 48px; max-width: 100%; }

            }
            .desktop-right {
                width: 440px;
                flex-shrink: 0;
            }
            .phone-shell {
                max-width: 100%;
            }
        }

    Gift:   ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5" rx="1"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>,
    Bolt:   ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    Line:   ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>,
};

/* ── Spectrum Header Strip ─────────────────── */
const SpectrumStrip = () => (
    <div className="spectrum-strip">
        <div style={{flex:1,background:'#D63030'}}/>
        <div style={{flex:1,background:'#E8600A'}}/>
        <div style={{flex:1,background:'#2E8B5A'}}/>
        <div style={{flex:1,background:'#3A70B0'}}/>
    </div>
);

/* ── Score Bar ────────────────────────────── */
function ScoreBar({ label, score, color }) {
    return (
        <div style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.9)',marginBottom:4}}>
                <span>{label}</span><span style={{fontVariantNumeric:'tabular-nums'}}>{score}</span>
            </div>
            <div style={{height:6,background:'rgba(255,255,255,0.15)',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',background:color,width:`${(score/30)*100}%`,borderRadius:4,transition:'width 1s ease-out'}}/>
            </div>
        </div>
    );
}

/* ── Desktop detection (stable, computed once) ── */
const isDesktop = window.innerWidth >= 768;

/* ── Shell wrapper (defined outside App to keep identity stable) ── */
function Shell({children}) {
    if (!isDesktop) return <div className="page fade-up">{children}</div>;
    return (
        <div className="page">
            <div className="phone-shell">
                <div className="phone-content no-bar">{children}</div>
            </div>
        </div>
    );
}

/* ━━━ MAIN APP ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function App() {
    const [step, setStep]           = useState('home');
    const [mode, setMode]           = useState('quiz'); // 'quiz' | 'direct'
    const [name, setName]           = useState('');
    const [email, setEmail]         = useState('');
    const [phone, setPhone]         = useState('');
    const [botTrap, setBotTrap]     = useState('');
    const [qIdx, setQIdx]           = useState(0);
    const [answers, setAnswers]     = useState({});
    const [scores, setScores]       = useState({red:0,orange:0,green:0,blue:0});
    const [total, setTotal]         = useState(0);
    const [navigating, setNav]      = useState(false);
    const [referral, setReferral]   = useState([]);
    const [refErr, setRefErr]       = useState(false);
    const [showConfirm, setConfirm] = useState(false);
    const [showSS, setShowSS]       = useState(false);
    const [engPwd, setEngPwd]       = useState('');
    const [showEng, setShowEng]     = useState(false);
    // 歷史紀錄查詢
    const [lookNick, setLookNick]   = useState('');
    const [lookEmail, setLookEmail] = useState('');
    const [lookChild, setLookChild] = useState('');
    const [lookResult, setLookResult] = useState(null); // null | 'loading' | {data} | {error}
    const [lookErr, setLookErr]     = useState('');
    const [lookWho, setLookWho]     = useState(null); // null | 'adult' | 'child'
    const [uid]                     = useState(()=>'u_'+Math.random().toString(36).slice(2,9));

    const sortedTypes = () =>
        ['red','orange','green','blue']
            .map(id=>({id,...TYPE_INFO[id]}))
            .sort((a,b)=>scores[b.id]-scores[a.id]);

    const reset = () => {
        setStep('home'); setMode('quiz'); setName(''); setEmail(''); setPhone('');
        setQIdx(0); setAnswers({}); setScores({red:0,orange:0,green:0,blue:0});
        setTotal(0); setReferral([]); setRefErr(false);
        setConfirm(false); setShowSS(false); setShowEng(false); setEngPwd(''); setBotTrap('');
        setLookNick(''); setLookEmail(''); setLookChild(''); setLookResult(null); setLookErr(''); setLookWho(null);
    };

    const doLookup = async () => {
        if (!lookNick.trim()) { setLookErr('請填寫暱稱'); return; }
        if (lookWho === 'adult') {
            if (!lookEmail.trim() || !lookEmail.includes('@')) { setLookErr('請填寫有效的家長 Email'); return; }
        } else {
            if (!lookChild.trim() || !lookChild.includes('@')) { setLookErr('請填寫有效的孩子信箱'); return; }
        }
        setLookErr('');
        setLookResult('loading');
        try {
            const params = new URLSearchParams({
                nickname: lookNick.trim(),
                email: lookWho === 'adult' ? lookEmail.trim() : '無',
                childEmail: lookWho === 'child' ? lookChild.trim() : '無',
            });
            const res = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);
            const json = await res.json();
            setLookResult(json);
        } catch(e) {
            setLookResult({error: '查詢失敗，請檢查網路連線後再試。'});
        }
    };

    const handleRegisterSubmit = (e) => {
        e.preventDefault();
        if (botTrap) return;
        if (!validPhone(phone)) { alert('請填寫正確的手機號碼（如 0912345678）'); return; }
        if (mode === 'quiz') { setStep('quiz'); }
        else { setStep('contact'); }
    };

    const handleAnswer = (score) => {
        if (navigating) return;
        setNav(true);
        const updated = {...answers, [qIdx+1]: score};
        setAnswers(updated);
        setTimeout(()=>{
            if (qIdx < QUESTIONS.length - 1) {
                setQIdx(q=>q+1); setNav(false);
            } else {
                let t=0, sc={red:0,orange:0,green:0,blue:0};
                QUESTIONS.forEach((_,i)=>{
                    const v = (i===qIdx ? score : updated[i+1]) || 0;
                    t += v; sc[CATS[i]] += v;
                });
                setTotal(t); setScores(sc); setNav(false); setStep('contact');
            }
        }, 180);
    };

    const toggleRef = (o) => {
        setRefErr(false);
        setReferral(r => r.includes(o) ? r.filter(x=>x!==o) : [...r,o]);
    };

    const trySubmit = () => {
        if (referral.length===0) { setRefErr(true); return; }
        doSubmit();
    };

    const doSubmit = () => {
        setConfirm(false);
        setStep('result');
        if (botTrap) return;
        try {
            fetch(GOOGLE_SCRIPT_URL, {
                method:'POST', mode:'no-cors', cache:'no-cache',
                body: JSON.stringify({
                    identity:'家長', nickname:sanitize(name),
                    email, phone,
                    totalScore: mode==='direct' ? 0 : total,
                    ...( mode==='direct' ? {red:0,orange:0,green:0,blue:0} : scores ),
                    answers: mode==='direct' ? {} : answers,
                    uid, mode,
                    submittedAt: new Date().toISOString(),
                    referral: referral.join(','),
                    source:   referral.join(','),
                })
            });
        } catch(e) { console.error(e); }
    };

    const runEngineer = () => {
        if (engPwd !== '63811') { setShowEng(false); setEngPwd(''); return; }
        const rid = Math.floor(Math.random()*9000)+1000;
        let ta={}, tt=0, ts={red:0,orange:0,green:0,blue:0};
        QUESTIONS.forEach((_,i)=>{ const v=Math.ceil(Math.random()*5); ta[i+1]=v; tt+=v; ts[CATS[i]]+=v; });
        setName(`測試員_${rid}`); setEmail(`test${rid}@example.com`);
        setPhone('0900000000'); setAnswers(ta); setTotal(tt); setScores(ts);
        setMode('quiz'); setShowEng(false); setEngPwd(''); setStep('contact');
    };

    const top  = sortedTypes()[0];
    const info = top ? TYPE_INFO[top.id] : null;
    const progress = Math.round(((qIdx+1)/QUESTIONS.length)*100);

    /* isDesktop is stable — computed once at module load */

    /* ━━━ 首頁 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    if (step==='home') return (
        <Shell>
            {/* Header */}
            <div className="top-header">
                <div className="title-main" style={{fontSize:32,fontWeight:900,color:'#fff',lineHeight:1.2}}>覺知SEL</div>
                <div className="title-sub" style={{fontSize:14,color:'rgba(255,255,255,0.75)',marginTop:8,fontWeight:500}}>看見自己與孩子的內在狀態</div>
                <SpectrumStrip/>
            </div>

            <div className="content">
                {/* 我是家長 */}
                <button className="entry-card fade-up" onClick={()=>{setMode('quiz');setStep('register');}} style={{border:'none',width:'100%',textAlign:'left'}}>
                    <div style={{width:48,height:48,background:'#EEF4FF',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3A70B0" strokeWidth="2" strokeLinecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
                    </div>
                    <div style={{flex:1}}>
                        <div className="entry-title" style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:2}}>我是家長</div>
                        <div className="entry-sub" style={{fontSize:12,color:'var(--text-light)'}}>進入成人版測驗</div>
                    </div>
                    <span style={{color:'var(--text-light)',flexShrink:0}}><Ico.Chevron/></span>
                </button>

                {/* 我是孩子 */}
                <a href={CHILD_VERSION_URL} target="_blank" rel="noopener noreferrer" className="entry-card" style={{animationDelay:'0.05s'}}>
                    <div style={{width:48,height:48,background:'#F0FAF4',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <Ico.Smile/>
                    </div>
                    <div style={{flex:1}}>
                        <div className="entry-title" style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:2}}>我是孩子</div>
                        <div className="entry-sub" style={{fontSize:12,color:'var(--text-light)'}}>進入孩子版測驗</div>
                    </div>
                    <span style={{color:'var(--text-light)',flexShrink:0}}><Ico.Chevron/></span>
                </a>

                {/* 領取心智譜說明 */}
                <button className="fade-up" onClick={()=>{setMode('direct');setStep('register');}}
                    style={{width:'100%',background:'#3A70B0',color:'#fff',border:'none',borderRadius:14,padding:'15px',fontSize:15,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:10,animationDelay:'0.1s'}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                    領取心智譜說明
                </button>

                {/* 查詢過往紀錄 */}
                <button onClick={()=>setStep('lookup')}
                   style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,width:'100%',background:'rgba(0,0,0,0.05)',color:'var(--text-mid)',borderRadius:14,padding:'13px',fontSize:14,fontWeight:600,border:'1px solid var(--surface2)',cursor:'pointer'}}>
                    <Ico.Search/> 查詢過往紀錄
                </button>
            </div>
        </Shell>
    );

    /* ━━━ 填資料 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    if (step==='register') return (
        <Shell>
            <div className="top-header">
                <div className="title-label" style={{fontSize:11,letterSpacing:'3px',color:'rgba(255,255,255,0.5)',marginBottom:8,fontWeight:700}}>
                    {mode==='quiz' ? '成人版測驗' : '領取心智光譜說明'}
                </div>
                <div className="title-main" style={{fontSize:24,fontWeight:900,color:'#fff'}}>
                    {mode==='quiz' ? '填寫後進入測驗' : '填寫基本資料'}
                </div>
                <div className="title-sub" style={{fontSize:13,color:'rgba(255,255,255,0.6)',marginTop:8,lineHeight:1.6}}>
                    {mode==='quiz'
                        ? '請依照壓力下的直覺作答，\n無需過度思考。'
                        : '填寫完成後，\n心智光譜說明將寄至您的 Email。'}
                </div>
                <SpectrumStrip/>
            </div>

            <div className="content">
                <div className="card" style={{padding:'24px 20px'}}>
                    <form onSubmit={handleRegisterSubmit}>
                        {/* Bot trap */}
                        <div style={{position:'absolute',opacity:0,height:0,overflow:'hidden'}}>
                            <input tabIndex="-1" autoComplete="off" value={botTrap} onChange={e=>setBotTrap(e.target.value)}/>
                        </div>

                        <div style={{marginBottom:14}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>姓名</label>
                            <div className="input-wrap">
                                <span className="input-icon"><Ico.User/></span>
                                <input type="text" required className="input-field" placeholder="例如：王小明"
                                    value={name} onChange={e=>setName(e.target.value)}/>
                            </div>
                        </div>

                        <div style={{marginBottom:14}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>電子信箱
                                <span style={{fontSize:11,fontWeight:400,color:'var(--text-light)',marginLeft:4}}>（說明將寄至此信箱）</span>
                            </label>
                            <div className="input-wrap">
                                <span className="input-icon"><Ico.Mail/></span>
                                <input type="email" required className="input-field" placeholder="example@mail.com"
                                    value={email} onChange={e=>setEmail(e.target.value)}/>
                            </div>
                        </div>

                        <div style={{marginBottom:22}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>聯繫電話</label>
                            <div className="input-wrap">
                                <span className="input-icon"><Ico.Phone/></span>
                                <input type="tel" required className="input-field" placeholder="09xxxxxxxx" maxLength="10"
                                    value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,10))}/>
                            </div>
                            {phone.length>0 && !validPhone(phone) &&
                                <p style={{fontSize:12,color:'#D63030',marginTop:4,fontWeight:600}}>請填寫正確的手機號碼格式</p>}
                        </div>

                        <button type="submit" className="btn-primary">
                            {mode==='quiz' ? <><Ico.Bolt/> 開始測驗</> : <><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5" rx="1"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg> 確認領取說明</>}
                        </button>
                    </form>
                </div>

                <button onClick={reset} className="btn-ghost"><Ico.ChevronL/> 返回</button>

                <div style={{textAlign:'center',marginTop:16}}>
                    <button onClick={()=>setShowEng(true)} style={{fontSize:10,color:'var(--surface2)',background:'none',border:'none',cursor:'pointer'}}>工程師</button>
                </div>
            </div>

            {showEng && (
                <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                     onClick={()=>{setShowEng(false);setEngPwd('');}}>
                    <div className="card pop-in" style={{maxWidth:300,width:'100%',padding:24}} onClick={e=>e.stopPropagation()}>
                        <div style={{fontSize:16,fontWeight:700,color:'var(--text-dark)',marginBottom:12,textAlign:'center'}}>工程師測試模式</div>
                        <input type="password" className="input-field" style={{paddingLeft:14,textAlign:'center',letterSpacing:4}}
                            placeholder="密碼" value={engPwd} onChange={e=>setEngPwd(e.target.value)}/>
                        <button onClick={runEngineer} className="btn-primary" style={{marginTop:12,fontSize:14}}>生成測試資料</button>
                    </div>
                </div>
            )}
        </Shell>
    );

    /* ━━━ 測驗 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    if (step==='quiz') return (
        <Shell>
            <div style={{background:'var(--primary)'}}>
                {/* 進度 Header */}
                <div style={{background:'var(--primary)',padding:'20px 20px 16px',width:'100%'}}>
                    <div style={{maxWidth:480,margin:'0 auto'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                            <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,0.6)',letterSpacing:1}}>題目 {qIdx+1} / {QUESTIONS.length}</span>
                            <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,0.6)'}}>{progress}%</span>
                        </div>
                        {/* Progress bar */}
                        <div style={{position:'relative',height:28}}>
                            <div style={{position:'absolute',bottom:0,width:'100%',height:5,background:'rgba(255,255,255,0.12)',borderRadius:4,overflow:'hidden'}}>
                                <div style={{height:'100%',background:'var(--accent)',width:`${progress}%`,borderRadius:4,transition:'width 0.3s ease'}}/>
                            </div>
                            <div style={{position:'absolute',top:0,transition:'left 0.3s ease',left:`calc(${progress}% - 12px)`}}>
                                <div style={{background:'var(--accent)',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(232,96,10,0.4)'}}>
                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                {/* 題目 + 選項 */}
                <div style={{flex:1,width:'100%',padding:'20px 18px 36px',maxWidth:480,margin:'0 auto',overflowY:'auto'}} className="no-bar">
                    {/* 題目卡 */}
                    <div className="card slide-in" key={qIdx} style={{textAlign:'center',padding:'28px 20px',marginBottom:18,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',minHeight:120,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center'}}>
                        <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',letterSpacing:2,marginBottom:10,textTransform:'uppercase'}}>題目 {qIdx+1}</div>
                        <div className="opt-label" style={{fontSize:20,fontWeight:800,color:'#fff',lineHeight:1.55,whiteSpace:'pre-line'}}>{QUESTIONS[qIdx]}</div>
                    </div>

                    {/* 選項 */}
                    {OPTIONS.map((o,i)=>(
                        <button key={o.score} className="option-btn slide-in" style={{animationDelay:`${i*0.04}s`,background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)'}}

                            <span className="opt-label" style={{fontSize:16,fontWeight:700,color:'#fff'}}>{o.label}</span>
                            <span className="opt-badge" style={{background:'rgba(232,96,10,0.25)',color:'#F5914A',borderRadius:10,padding:'3px 12px',fontSize:12,fontWeight:700}}>{o.score} 分</span>
                        </button>
                    ))}

                    {qIdx>0 && (
                        <button onClick={()=>setQIdx(q=>q-1)} className="btn-ghost" style={{color:'rgba(255,255,255,0.4)',marginTop:8}}>
                            <Ico.ChevronL/> 返回上一題
                        </button>
                    )}
                </div>
            </div>
        </Shell>
    );

    /* ━━━ 確認資料（做完測驗後） ━━━━━━━━━━━━━━━ */
    if (step==='contact') {
        const s = sortedTypes();
        return (
            <Shell>
                {/* 結果預覽 Header */}
                <div className="top-header">
                    {mode==='quiz' && <>
                        <div style={{fontSize:12,color:'rgba(255,255,255,0.55)',marginBottom:6,fontWeight:600}}>測驗初步結果</div>
                        <div style={{fontSize:26,fontWeight:900,color:'#fff',marginBottom:12}}>{s[0].label}</div>
                        <div style={{maxWidth:320,margin:'0 auto'}}>
                            <ScoreBar label="開創型（紅）" score={scores.red}    color="#D63030"/>
                            <ScoreBar label="關懷型（橙）" score={scores.orange} color="#F5914A"/>
                            <ScoreBar label="協調型（綠）" score={scores.green}  color="#4CAF7D"/>
                            <ScoreBar label="分析型（藍）" score={scores.blue}   color="#80B8E8"/>
                        </div>
                    </>}
                    {mode==='direct' && <>
                        <div style={{fontSize:12,color:'rgba(255,255,255,0.55)',marginBottom:8,fontWeight:600,letterSpacing:2}}>領取心智光譜說明</div>
                        <div style={{fontSize:24,fontWeight:900,color:'#fff'}}>確認您的資料</div>
                        <div style={{fontSize:13,color:'rgba(255,255,255,0.6)',marginTop:8}}>說明將寄至您填寫的 Email</div>
                    </>}
                    <SpectrumStrip/>
                </div>

                <div className="content">
                    <div className="card" style={{padding:'20px'}}>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--accent)',marginBottom:14,display:'flex',alignItems:'center',gap:6}}>
                            <Ico.Check/> 確認資料
                        </div>

                        <div style={{marginBottom:10}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:4}}>姓名</label>
                            <input className="input-field" style={{paddingLeft:14}} value={name} onChange={e=>setName(e.target.value)} placeholder="您的姓名"/>
                        </div>
                        <div style={{marginBottom:10}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:4}}>Email <span style={{fontWeight:400,color:'var(--text-light)'}}>（說明寄送用）</span></label>
                            <input className="input-field" style={{paddingLeft:14}} value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@mail.com"/>
                        </div>
                        <div>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:4}}>聯繫電話</label>
                            <input className="input-field" style={{paddingLeft:14}} value={phone}
                                onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,10))} placeholder="09xxxxxxxx" maxLength="10"/>
                        </div>
                    </div>

                    <button onClick={()=>{
                        if(!name||!email.includes('@')||!validPhone(phone)){alert('請填寫完整聯絡資料');return;}
                        setConfirm(true);
                    }} className="btn-primary" style={{marginBottom:10}}>
                        確認並領取分析說明
                    </button>
                    <button onClick={reset} className="btn-ghost">返回首頁</button>
                </div>

                {/* 來源 Modal */}
                {showConfirm && (
                    <div style={{position:'fixed',inset:0,background:'rgba(10,18,32,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                         onClick={()=>setConfirm(false)}>
                        <div className="card pop-in" style={{maxWidth:360,width:'100%',padding:'28px 24px'}} onClick={e=>e.stopPropagation()}>
                            <div style={{textAlign:'center',marginBottom:16}}>
                                <div style={{width:48,height:48,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px'}}>
                                    <Ico.Mail/>
                                </div>
                                <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)'}}>確認送出</div>
                                <div style={{fontSize:13,color:'var(--text-mid)',marginTop:6,lineHeight:1.6}}>
                                    說明將寄至 <span style={{color:'var(--accent)',fontWeight:700}}>{email}</span>
                                </div>
                            </div>

                            {/* 來源 */}
                            <div style={{background:refErr?'#FFF5F5':'var(--surface)',borderRadius:14,padding:'14px',border:refErr?'1.5px solid #FECACA':'1.5px solid var(--surface2)',marginBottom:16}}>
                                <div style={{fontSize:13,fontWeight:700,color:refErr?'#D63030':'var(--text-dark)',marginBottom:10}}>
                                    如何得知本測驗？<span style={{fontSize:11,fontWeight:400,color:'var(--text-light)',marginLeft:4}}>(必填)</span>
                                </div>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                    {REFERRAL_OPTIONS.map(o=>(
                                        <button key={o} onClick={()=>toggleRef(o)} style={{
                                            padding:'9px 10px',borderRadius:10,fontSize:12,fontWeight:700,
                                            border: referral.includes(o)?'2px solid var(--accent)':'1.5px solid var(--surface2)',
                                            background: referral.includes(o)?'var(--accent)':'var(--white)',
                                            color: referral.includes(o)?'#fff':'var(--text-mid)',
                                            cursor:'pointer',display:'flex',alignItems:'center',gap:6,
                                            transition:'all 0.15s'
                                        }}>
                                            <div style={{width:12,height:12,borderRadius:3,border:referral.includes(o)?'1.5px solid rgba(255,255,255,0.5)':'1.5px solid var(--surface2)',background:referral.includes(o)?'rgba(255,255,255,0.25)':'transparent',flexShrink:0}}/>
                                            {o}
                                        </button>
                                    ))}
                                </div>
                                {refErr && <div style={{fontSize:11,color:'#D63030',marginTop:8,fontWeight:600}}>※ 請至少選擇一項</div>}
                            </div>

                            <button onClick={trySubmit} className="btn-primary">確認送出</button>
                            <button onClick={()=>setConfirm(false)} style={{width:'100%',marginTop:10,padding:10,background:'var(--surface)',border:'none',borderRadius:12,fontSize:13,fontWeight:600,color:'var(--text-mid)',cursor:'pointer'}}>返回修改</button>
                        </div>
                    </div>
                )}
            </Shell>
        );
    }

    /* ━━━ 結果頁 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    if (step==='result') {
        const s = sortedTypes();
        return (
            <Shell>
                {/* 結果 Header */}
                <div className="top-header" style={{paddingBottom:28}}>
                    <div style={{width:48,height:48,background:'rgba(255,255,255,0.12)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1px solid rgba(255,255,255,0.2)'}}>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>

                    {mode==='quiz' ? <>
                        <div style={{fontSize:12,color:'rgba(255,255,255,0.55)',marginBottom:6,letterSpacing:1}}>您的心智光譜</div>
                        <div style={{fontSize:28,fontWeight:900,color:'#fff',marginBottom:4}}>{info.label}</div>
                        <div style={{fontSize:13,color:'rgba(255,255,255,0.6)',marginBottom:14}}>說明已寄至您的信箱</div>
                        <div style={{maxWidth:300,margin:'0 auto'}}>
                            <ScoreBar label="開創型（紅）" score={scores.red}    color="#D63030"/>
                            <ScoreBar label="關懷型（橙）" score={scores.orange} color="#F5914A"/>
                            <ScoreBar label="協調型（綠）" score={scores.green}  color="#4CAF7D"/>
                            <ScoreBar label="分析型（藍）" score={scores.blue}   color="#80B8E8"/>
                        </div>
                    </> : <>
                        <div style={{fontSize:12,color:'rgba(255,255,255,0.55)',marginBottom:6,letterSpacing:1}}>領取成功</div>
                        <div style={{fontSize:26,fontWeight:900,color:'#fff',marginBottom:6}}>心智光譜說明</div>
                        <div style={{fontSize:13,color:'rgba(255,255,255,0.6)'}}>說明已寄至 {email}</div>
                    </>}
                    <SpectrumStrip/>
                </div>

                <div className="content">
                    {/* 型別說明（只在 quiz 模式顯示） */}
                    {mode==='quiz' && info && (
                        <div style={{marginBottom:16}}>
                            <div className="type-section" style={{borderLeftColor:'var(--red)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--red)',letterSpacing:1.5,marginBottom:6}}>壓力下的表現</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.7}}>{info.stress}</div>
                            </div>
                            <div className="type-section" style={{borderLeftColor:'var(--blue)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',letterSpacing:1.5,marginBottom:6}}>您的優勢</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.7}}>{info.strength}</div>
                            </div>
                            <div className="type-section" style={{borderLeftColor:'var(--green)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--green)',letterSpacing:1.5,marginBottom:6}}>覺知練習</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.7}}>{info.practice}</div>
                            </div>
                        </div>
                    )}

                    {/* 直接領取模式的說明 */}
                    {mode==='direct' && (
                        <div className="card" style={{textAlign:'center',padding:'24px 20px',marginBottom:16}}>
                            <div style={{fontSize:36,marginBottom:12}}>📬</div>
                            <div style={{fontSize:16,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>說明已寄出！</div>
                            <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.7}}>
                                請至 <span style={{fontWeight:700,color:'var(--accent)'}}>{email}</span> 查收<br/>
                                若未收到，請檢查垃圾郵件信箱
                            </div>
                        </div>
                    )}

                    {/* 行動按鈕 */}
                    <a href={LINE_ADD_FRIEND_URL} target="_blank" rel="noopener noreferrer"
                       style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',background:'#06C755',color:'#fff',borderRadius:14,padding:'15px',fontWeight:700,fontSize:15,textDecoration:'none',marginBottom:10,boxShadow:'0 4px 12px rgba(6,199,85,0.25)'}}>
                        <Ico.Line/> 加入 LINE，接收更多資訊
                    </a>

                    {mode==='direct' && (
                        <button onClick={()=>{setMode('quiz');setStep('quiz');}}
                            className="btn-primary" style={{marginBottom:10}}>
                            <Ico.Bolt/> 也來做個測驗吧
                        </button>
                    )}

                    <a href={CHILD_VERSION_URL} target="_blank" rel="noopener noreferrer"
                       style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',background:'var(--surface)',color:'var(--text-mid)',border:'1.5px solid var(--surface2)',borderRadius:14,padding:'13px',fontWeight:700,fontSize:14,textDecoration:'none',marginBottom:10}}>
                        <Ico.Smile/> 帶孩子也來測測看 →
                    </a>

                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                        <button onClick={()=>setShowSS(true)}
                            style={{background:'var(--surface)',color:'var(--text-mid)',border:'1.5px solid var(--surface2)',borderRadius:12,padding:'12px',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                            <Ico.Camera/> 截圖保存
                        </button>
                        <button onClick={()=>window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(QUIZ_SHARE_URL)}`,'_blank')}
                            style={{background:'var(--surface)',color:'var(--text-mid)',border:'1.5px solid var(--surface2)',borderRadius:12,padding:'12px',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                            <Ico.Share/> 分享測驗
                        </button>
                    </div>

                    <button onClick={reset} className="btn-ghost" style={{color:'var(--text-light)'}}>
                        <Ico.Restart/> 重新開始
                    </button>
                </div>

                {/* 截圖提示 */}
                {showSS && (
                    <div style={{position:'fixed',inset:0,background:'rgba(10,18,32,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                         onClick={()=>setShowSS(false)}>
                        <div className="card pop-in" style={{maxWidth:300,width:'100%',padding:'28px 24px',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                            <div style={{fontSize:36,marginBottom:12}}>📸</div>
                            <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>請截圖保存</div>
                            <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.7,marginBottom:20}}>
                                請使用手機截圖功能，<br/>保存您的測驗結果。
                            </div>
                            <button onClick={()=>setShowSS(false)} className="btn-primary" style={{fontSize:15}}>我知道了</button>
                        </div>
                    </div>
                )}
            </Shell>
        );
    }

    /* ━━━ 歷史紀錄查詢 ━━━━━━━━━━━━━━━━━━━━━━━━ */
    if (step==='lookup') return (
        <Shell>
            <div className="top-header">
                <div className="title-label" style={{fontSize:11,letterSpacing:'3px',color:'rgba(255,255,255,0.5)',marginBottom:8,fontWeight:700}}>歷史紀錄查詢</div>
                <div className="title-main" style={{fontSize:24,fontWeight:900,color:'#fff'}}>查詢過往測驗紀錄</div>
                <div className="title-sub" style={{fontSize:13,color:'rgba(255,255,255,0.6)',marginTop:8,lineHeight:1.6}}>請填寫當時測驗所填的資料</div>
                <SpectrumStrip/>
            </div>

            <div className="content">
                {/* 身份選擇 */}
                {!lookWho && lookResult === null && (
                    <div style={{marginBottom:16}}>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--text-mid)',marginBottom:12,textAlign:'center'}}>請選擇您要查詢哪一筆紀錄</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                            <button onClick={()=>setLookWho('adult')} style={{
                                padding:'20px 12px',borderRadius:14,border:'1.5px solid var(--surface2)',
                                background:'var(--white)',cursor:'pointer',textAlign:'center',transition:'all 0.15s',
                                boxShadow:'0 1px 4px rgba(26,39,64,0.06)'
                            }}>
                                <div style={{fontSize:28,marginBottom:8}}>🧑</div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--text-dark)',marginBottom:4}}>家長紀錄</div>
                                <div style={{fontSize:11,color:'var(--text-light)'}}>以 Email 查詢</div>
                            </button>
                            <button onClick={()=>setLookWho('child')} style={{
                                padding:'20px 12px',borderRadius:14,border:'1.5px solid var(--surface2)',
                                background:'var(--white)',cursor:'pointer',textAlign:'center',transition:'all 0.15s',
                                boxShadow:'0 1px 4px rgba(26,39,64,0.06)'
                            }}>
                                <div style={{fontSize:28,marginBottom:8}}>🧒</div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--text-dark)',marginBottom:4}}>孩子紀錄</div>
                                <div style={{fontSize:11,color:'var(--text-light)'}}>以孩子信箱查詢</div>
                            </button>
                        </div>
                    </div>
                )}

                {lookWho && (lookResult === null || lookResult === 'loading') ? (
                    <div className="card" style={{padding:'24px 20px'}}>
                        {/* 身份提示列 */}
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,paddingBottom:14,borderBottom:'1px solid var(--surface2)'}}>
                            <div style={{fontSize:22}}>{lookWho==='adult'?'🧑':'🧒'}</div>
                            <div>
                                <div style={{fontSize:14,fontWeight:800,color:'var(--text-dark)'}}>{lookWho==='adult'?'家長版紀錄':'孩子版紀錄'}</div>
                                <button onClick={()=>{setLookWho(null);setLookErr('');setLookResult(null);setLookNick('');setLookEmail('');setLookChild('');}} style={{fontSize:11,color:'var(--text-light)',background:'none',border:'none',cursor:'pointer',padding:0,marginTop:2}}>切換身份 →</button>
                            </div>
                        </div>

                        <div style={{marginBottom:14}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>當時填寫的暱稱</label>
                            <div className="input-wrap">
                                <span className="input-icon"><Ico.User/></span>
                                <input type="text" className="input-field" placeholder="例如：王小明"
                                    value={lookNick} onChange={e=>setLookNick(e.target.value)}/>
                            </div>
                        </div>

                        {/* 家長：填 Email；孩子：填孩子信箱 */}
                        {lookWho==='adult' ? (
                            <div style={{marginBottom:22}}>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>
                                    家長 Email
                                    <span style={{fontSize:11,fontWeight:400,color:'var(--text-light)',marginLeft:4}}>（當時填寫的信箱）</span>
                                </label>
                                <div className="input-wrap">
                                    <span className="input-icon"><Ico.Mail/></span>
                                    <input type="email" className="input-field" placeholder="example@mail.com"
                                        value={lookEmail} onChange={e=>setLookEmail(e.target.value)}/>
                                </div>
                            </div>
                        ) : (
                            <div style={{marginBottom:22}}>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>
                                    孩子測驗信箱
                                </label>
                                <div className="input-wrap">
                                    <span className="input-icon"><Ico.Smile/></span>
                                    <input type="email" className="input-field" placeholder="孩子的 Email"
                                        value={lookChild} onChange={e=>setLookChild(e.target.value)}/>
                                </div>
                            </div>
                        )}

                        {lookErr && <div style={{fontSize:12,color:'#D63030',marginBottom:12,fontWeight:600,padding:'8px 12px',background:'#FFF5F5',borderRadius:8}}>⚠ {lookErr}</div>}

                        <button className="btn-primary" onClick={doLookup} disabled={lookResult==='loading'}
                            style={{opacity: lookResult==='loading'?0.7:1}}>
                            {lookResult==='loading'
                                ? <><span style={{display:'inline-block',width:16,height:16,border:'2px solid rgba(255,255,255,0.4)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/> 查詢中…</>
                                : <><Ico.Search/> 立即查詢紀錄</>
                            }
                        </button>
                    </div>
                ) : (lookResult && lookResult !== 'loading' && lookResult.error) ? (
                    <div className="card" style={{padding:'24px 20px',textAlign:'center'}}>
                        <div style={{fontSize:36,marginBottom:12}}>😕</div>
                        <div style={{fontSize:16,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>查無紀錄</div>
                        <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.7,marginBottom:20}}>
                            {lookResult.error === 'missing parameters' || lookResult.error === 'not found'
                                ? '找不到符合的測驗紀錄，\n請確認填寫的資料是否正確。'
                                : lookResult.error}
                        </div>
                        <button className="btn-outline" onClick={()=>setLookResult(null)}>重新查詢</button>
                    </div>
                ) : (lookResult && lookResult !== 'loading' && !lookResult.error) ? (
                    <div>
                        {/* 查詢成功 */}
                        <div className="card" style={{padding:'20px',marginBottom:12,background:'var(--green-pale)',border:'1.5px solid #9BE3BF'}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                                <div style={{width:32,height:32,background:'var(--green)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <Ico.Check/>
                                </div>
                                <div style={{fontSize:16,fontWeight:800,color:'var(--green)'}}>找到您的紀錄</div>
                            </div>
                            <div style={{fontSize:13,color:'var(--text-mid)',lineHeight:2}}>
                                <div><span style={{fontWeight:700,color:'var(--text-dark)'}}>姓名：</span>{lookResult.nickname || lookResult.name || '—'}</div>
                                <div><span style={{fontWeight:700,color:'var(--text-dark)'}}>測驗日期：</span>{lookResult.submittedAt ? new Date(lookResult.submittedAt).toLocaleDateString('zh-TW') : lookResult.date || '—'}</div>
                                {lookResult.mode !== 'direct' && lookResult.totalScore !== undefined && (
                                    <div><span style={{fontWeight:700,color:'var(--text-dark)'}}>總分：</span>{lookResult.totalScore}</div>
                                )}
                            </div>
                        </div>

                        {/* 分數 */}
                        {lookResult.mode !== 'direct' && (lookResult.red !== undefined) && (
                            <div className="card" style={{padding:'20px',marginBottom:12}}>
                                <div style={{fontSize:13,fontWeight:700,color:'var(--text-mid)',marginBottom:12}}>心智光譜分布</div>
                                {[
                                    {key:'red',   label:'開創型（紅）', color:'#D63030'},
                                    {key:'orange',label:'關懷型（橙）', color:'#E8600A'},
                                    {key:'green', label:'協調型（綠）', color:'#2E8B5A'},
                                    {key:'blue',  label:'分析型（藍）', color:'#3A70B0'},
                                ].map(t=>(
                                    <div key={t.key} style={{marginBottom:10}}>
                                        <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,color:'var(--text-dark)',marginBottom:4}}>
                                            <span>{t.label}</span>
                                            <span style={{color:t.color}}>{lookResult[t.key] || 0}</span>
                                        </div>
                                        <div style={{height:6,background:'var(--surface2)',borderRadius:4,overflow:'hidden'}}>
                                            <div style={{height:'100%',background:t.color,width:`${((lookResult[t.key]||0)/30)*100}%`,borderRadius:4,transition:'width 1s ease-out'}}/>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <button className="btn-outline" onClick={()=>{setLookResult(null);setLookWho(null);setLookNick('');setLookEmail('');setLookChild('');}} style={{marginBottom:8}}>再查一筆</button>
                    </div>
                ) : null}

                <button onClick={reset} className="btn-ghost"><Ico.ChevronL/> 返回首頁</button>
            </div>

            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </Shell>
    );

    return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
