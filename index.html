<!-- ════════════════════════════════════════════════════════
     SubmitQueue v1.1 — 心智光譜提交排隊模組
     v1.1 修正：
       - localStorage 容量保護（最多 50 筆）
       - setConcurrency() 真的可動態調整
       - 失敗到底時保留 localStorage（下次開頁可重試）
     用法：把 fetch(URL, ...) 換成 SubmitQueue.add(URL, payload)
     ════════════════════════════════════════════════════════ -->
<script>
const SubmitQueue = (() => {
  let CONCURRENCY     = 2;        // 同時最多幾個請求（可由 setConcurrency 動態調整）
  const MAX_RETRIES   = 3;
  const BASE_DELAY_MS = 1500;
  const MAX_PERSIST   = 50;       // localStorage 最多保留筆數
  const STORAGE_KEY   = 'msq_pending';

  let queue = [];
  let running = 0;
  let online = navigator.onLine;

  const callbacks = {
    onSuccess: (uid) => console.log('[Queue] OK uid:', uid),
    onFail:    (uid, err) => console.warn('[Queue] FAIL uid:', uid, err),
    onRetry:   (uid, n)  => console.log('[Queue] retry uid:', uid, '#', n),
    onQueued:  (uid, len) => console.log('[Queue] queued uid:', uid, 'q=', len),
  };

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function execute(task) {
    running++;
    let attempt = 0;
    while (attempt <= MAX_RETRIES) {
      try {
        await fetch(task.url, {
          method:  'POST',
          mode:    'no-cors',
          cache:   'no-cache',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body:    JSON.stringify(task.payload),
        });
        // no-cors 拿不到 status，能 resolve 就視為成功
        removePersisted(task.uid);
        callbacks.onSuccess(task.uid);
        break;
      } catch (err) {
        attempt++;
        if (attempt > MAX_RETRIES) {
          // v1.1：失敗到底保留 localStorage，下次開頁再試
          callbacks.onFail(task.uid, err.message);
          break;
        }
        callbacks.onRetry(task.uid, attempt);
        await sleep(BASE_DELAY_MS * Math.pow(2, attempt - 1));
      }
    }
    running--;
    next();
  }

  function next() {
    if (!online) return;
    while (running < CONCURRENCY && queue.length > 0) {
      execute(queue.shift());
    }
  }

  function persist(task) {
    try {
      const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      stored.push(task);
      // v1.1：超過 MAX_PERSIST 就丟最舊的，避免 localStorage 爆
      while (stored.length > MAX_PERSIST) stored.shift();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));
    } catch (_) {}
  }

  function removePersisted(uid) {
    try {
      const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stored.filter(t => t.uid !== uid)));
    } catch (_) {}
  }

  function loadPersisted() {
    try {
      const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      if (stored.length > 0) {
        console.log('[Queue] load persisted:', stored.length);
        stored.forEach(t => queue.push(t));
        next();
      }
    } catch (_) {}
  }

  window.addEventListener('online',  () => { online = true;  console.log('[Queue] online');  next(); });
  window.addEventListener('offline', () => { online = false; console.log('[Queue] offline'); });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPersisted);
  } else {
    loadPersisted();
  }

  return {
    add(url, payload) {
      const uid = payload.uid || ('msq_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7));
      const task = {
        uid,
        url,
        payload: { ...payload, uid, submittedAt: payload.submittedAt || new Date().toISOString() },
        addedAt: Date.now(),
      };
      persist(task);
      queue.push(task);
      callbacks.onQueued(uid, queue.length);
      next();
      return uid;
    },
    status() { return { queued: queue.length, running, online, concurrency: CONCURRENCY }; },
    on(event, fn) { if (callbacks[event] !== undefined) callbacks[event] = fn; return this; },
    // v1.1：真的可調整並發數，且立刻嘗試填滿
    setConcurrency(n) {
      if (typeof n === 'number' && n >= 1) {
        CONCURRENCY = n;
        next();
      }
      return this;
    },
  };
})();

function SlotDigit({ digit, delay }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const target = 5 * 10 + digit; // 轉 5 圈後停在目標位數
    el.style.transition = 'none';
    el.style.transform = 'translateY(0)';
    void el.offsetHeight; // 強制 reflow，確保每次都從頭轉
    requestAnimationFrame(() => {
      el.style.transition = 'transform 1.7s cubic-bezier(.16,.84,.28,1) ' + delay + 'ms';
      el.style.transform = 'translateY(-' + target + 'em)';
    });
  }, [digit, delay]);
  const reel = [];
  for (let i = 0; i <= 59; i++) reel.push(i % 10);
  return (
    <span style={{ display: 'inline-block', height: '1em', lineHeight: '1em', overflow: 'hidden', verticalAlign: '-0.12em', fontVariantNumeric: 'tabular-nums' }}>
      <span ref={ref} style={{ display: 'flex', flexDirection: 'column', willChange: 'transform' }}>
        {reel.map((n, i) => <span key={i} style={{ height: '1em', lineHeight: '1em' }}>{n}</span>)}
      </span>
    </span>);
}

/* ── Radar chart — 4 dimensions ── */
function RadarChart({ scores }) {
  const [animPct, setAnimPct] = React.useState(0);
  React.useEffect(() => {const t = setTimeout(() => setAnimPct(1), 300);return () => clearTimeout(t);}, []);
  const cx = 110,cy = 110,R = 78;
  const keys = ['red', 'orange', 'green', 'blue'];
  const colors = { red: '#E53E3E', orange: '#DD6B20', green: '#38A169', blue: '#3182CE' };
  const labels = { red: '開創型', orange: '關懷型', green: '協調型', blue: '分析型' };
  const angles = [-90, 0, 90, 180];
  const toRad = (d) => d * Math.PI / 180;
  const pts = keys.map((k, i) => {
    const r = R * (scores[k] / 30) * animPct;
    const a = toRad(angles[i]);
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  });
  const gridLvls = [.25, .5, .75, 1];
  return (
    <svg width="220" height="220" viewBox="0 0 220 220" style={{ display: 'block', margin: '0 auto' }}>
            {/* Grid */}
            {gridLvls.map((lv, gi) => {
        const gpts = keys.map((_, i) => {
          const r = R * lv,a = toRad(angles[i]);
          return `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`;
        }).join(' ');
        return <polygon key={gi} points={gpts} fill="none"
        stroke={gi === 3 ? '#B8C4FF' : '#DDE3FF'} strokeWidth={gi === 3 ? 1.5 : 1}
        strokeDasharray={gi < 3 ? '4,4' : undefined} />;
      })}
            {/* Axes */}
            {angles.map((ang, i) => {
        const a = toRad(ang);
        return <line key={i} x1={cx} y1={cy} x2={cx + R * Math.cos(a)} y2={cy + R * Math.sin(a)}
        stroke="#DDE3FF" strokeWidth="1" />;
      })}
            {/* Data polygon */}
            <polygon points={pts.map(([x, y]) => `${x},${y}`).join(' ')}
      fill="rgba(99,102,241,.14)" stroke="#6366F1" strokeWidth="2"
      style={{ transition: 'all 1.1s cubic-bezier(.22,.68,0,1.1)' }} />
            {/* Dots */}
            {pts.map(([x, y], i) =>
      <circle key={i} cx={x} cy={y} r="6"
      fill={colors[keys[i]]} stroke="white" strokeWidth="2"
      style={{ transition: 'all 1.1s cubic-bezier(.22,.68,0,1.1)' }} />
      )}
            {/* Labels */}
            {keys.map((k, i) => {
        const a = toRad(angles[i]),r = R + 22,lx = cx + r * Math.cos(a),ly = cy + r * Math.sin(a);
        const anchor = i === 0 || i === 2 ? 'middle' : i === 1 ? 'start' : 'end';
        return <text key={k} x={lx} y={ly} textAnchor={anchor} dominantBaseline="middle"
        fill={colors[k]} fontSize="11" fontWeight="800"
        style={{ fontFamily: "'Noto Sans TC',sans-serif" }}>{labels[k]}</text>;
      })}
        </svg>);

}

            color: parentColor === c.id ? c.color : '#6B7280'

                        </button>
          )}

                {pairResult &&

                            <div className="text-sm text-gray-800 leading-relaxed font-medium">{pairResult.tip}</div>
                        </div>
                    </div>
        }

                <button onClick={onClose} className="w-full bg-gray-800 text-white font-bold py-3 rounded-lg active:bg-black border-4 border-gray-600">
                    我知道了！
                </button>
            </div>
        </div>);

}

/* ── Desktop detection (stable, computed once) ── */
const isDesktop = window.innerWidth >= 768;

/* ── Shell (defined outside App to keep identity stable) ── */
function Shell({ children }) {
  if (!isDesktop) return (
    <div className="page fade-up">
            {children}
        </div>);

  return (
    <div className="page">
            <div className="phone-shell">
                <div className="phone-content no-bar">{children}</div>
            </div>
        </div>);

}

const renderZhuyinBlock = (zhuyinHtml) => {
  const regex = /<ruby>(.*?)<rt>(.*?)<\/rt><\/ruby>|([^<]+)/g;
  let match;
  const parts = [];
  while ((match = regex.exec(zhuyinHtml)) !== null) {
    if (match[1]) {
      const char = match[1];
      let fullZhuyin = match[2];
      let lightTone = '';
      let tone = '';
      let symbols = fullZhuyin;
      if (fullZhuyin.startsWith('˙')) {
        lightTone = '˙';
        symbols = fullZhuyin.substring(1);
      } else {
        const lastChar = fullZhuyin.slice(-1);
        if (['ˊ', 'ˇ', 'ˋ'].includes(lastChar)) {
          tone = lastChar;
          symbols = fullZhuyin.slice(0, -1);
        }
      }
      const symbolList = symbols.split('');
      parts.push(
        <span key={parts.length} className="zhuyin-char-block">
          <span className="zhuyin-main-char">{char}</span>
          <span className="zhuyin-phonetic-col">
            {lightTone && <span className="zhuyin-light-tone">{lightTone}</span>}
            {symbolList.map((s, idx) => <span key={idx} className="zhuyin-symbol">{s}</span>)}
            {tone && <span className="zhuyin-tone">{tone}</span>}
          </span>
        </span>
      );
    } else if (match[0]) {
      const chars = match[0].split('');
      chars.forEach((char) => {
        if (char.trim() === '') return;
        parts.push(
          <span key={parts.length} className="zhuyin-punct-block">
            <span className="zhuyin-punct-char">{char}</span>
          </span>
        );
      });
    }
  }
  return parts;
};

const Typewriter = ({ text, speed = 40, isTyping, onComplete }) => {
  const [displayLen, setDisplayLen] = useState(0);
  useEffect(() => setDisplayLen(0), [text]);
  useEffect(() => {
    if (!isTyping) {setDisplayLen(text.length);return;}
    if (displayLen < text.length) {
      const timer = setTimeout(() => setDisplayLen((prev) => prev + 1), speed);
      return () => clearTimeout(timer);
    } else {if (isTyping && onComplete) onComplete();}
  }, [displayLen, isTyping, text, speed, onComplete]);
  return <span>{text.substring(0, displayLen)}</span>;
};

  if (scene === 'battle') {

                  <span>{pokemonName}</span>
                  <span className="text-yellow-300 text-base">Lv.{pokemonLevel}</span>
                </div>
              </div>
              <div className="flex items-center justify-between mt-0.5 px-1">
                <div className="flex space-x-1">

                <div className="text-[7px] text-gray-400 font-black tracking-widest">MONSTER-V</div>
              </div>
            </div>
          </div>

          {/* Question card — pinned just above options */}
          <div className="flex-shrink-0">
            <div className="bg-white border-[3px] border-black py-3 px-4 shadow-[4px_4px_0_#000] rounded-2xl mx-1 mb-2 relative">

  }

  if (scene === 'contact') {

      <div className="h-full w-full bg-white flex flex-col items-center p-6 overflow-y-auto" style={{ fontFamily: "'DotGothic16', sans-serif" }}>

          <div className="bg-blue-600 text-white p-3 text-center border-b-4 border-black relative">

            </button>
          </form>
        </div>
      </div>);

  }

  if (scene === 'dex') {
    if (!finalResult) return <div>載入中...</div>;
    const results = finalResult.scores;

    const pokemon = finalResult.pokemon;
    const statsOrder = ['fire', 'electric', 'grass', 'water'];
    const displayStats = statsOrder.map((id) => results.find((r) => r.id === id));

    // Type-specific palette (4 themes)
    const PALETTES = {
      fire: { bg: '#FEE2E2', bg2: '#FECACA', main: '#DC2626', dark: '#991B1B', light: '#FEF2F2', glow: 'rgba(220,38,38,.45)', name: '紅色', emoji: '🔥', accent: '#F59E0B' },
      electric: { bg: '#FED7AA', bg2: '#FDBA74', main: '#EA580C', dark: '#9A3412', light: '#FFF7ED', glow: 'rgba(234,88,12,.45)', name: '橙色', emoji: '⚡', accent: '#7C3AED' },
      grass: { bg: '#BBF7D0', bg2: '#86EFAC', main: '#15803D', dark: '#14532D', light: '#F0FDF4', glow: 'rgba(21,128,61,.45)', name: '綠色', emoji: '🌿', accent: '#D97706' },

    };

      <div className="h-full w-full overflow-y-auto nes-scrollbar" style={{
        background: `linear-gradient(180deg,${P.bg} 0%,${P.bg2} 100%)`,

          <div className="rounded-2xl overflow-hidden" style={{

            <div style={{

              {/* Bar stats */}

                      </span>
                      <div style={{ flex: 1, height: 18, background: '#1F2937', border: '2px solid #111827', borderRadius: 8, position: 'relative', overflow: 'hidden' }}>

                background: '#fff', padding: '12px 14px', borderRadius: 10,
                border: `2px solid ${P.main}`, boxShadow: `3px 3px 0 ${P.dark}`,
                fontSize: 15, fontWeight: 900, color: P.dark, lineHeight: 1.6,
                fontFamily: "'Noto Sans TC',sans-serif"

                {mainType.core}

            {/* Detailed analysis */}

                background: P.light, padding: '12px 14px', borderRadius: 10, marginBottom: 10,
                borderLeft: `4px solid ${P.main}`

                <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 2, color: P.main, marginBottom: 5, fontFamily: "'Noto Sans TC',sans-serif" }}>
                  ▍ 壓力下的表現
                </div>
                <div style={{ fontSize: 14, color: P.dark, lineHeight: 1.7, fontWeight: 600 }}>
                  {mainType.traits}

              </div>

              {/* 你的優勢 */}
              <div style={{
                background: P.light, padding: '12px 14px', borderRadius: 10, marginBottom: 10,

  const [engPwd, setEngPwd] = useState('');
  const [showEng, setShowEng] = useState(false);
  const [lookNick, setLookNick] = useState('');

  const [lookChild, setLookChild] = useState('');
  const [lookResult, setLookResult] = useState(null);
  const [lookErr, setLookErr] = useState('');
  const [lookWho, setLookWho] = useState(null);
  const [uid] = useState(() => 'u_' + Math.random().toString(36).slice(2, 9));
  const [showChildApp, setShowChildApp] = useState(false);
  const [siteStats, setSiteStats] = useState(null); // { visits, tests }
  const testCountedRef = useRef(false);

  // 讀取「累積完成測驗人數」（只讀，不累加來訪）
  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const rows = await msCounterRpc('ms_get_counters');
        if (!alive) return;
        const m = {};(rows || []).forEach((r) => {m[r.name] = r.value;});
        setSiteStats({ tests: m.tests });
      } catch (e) {/* 計數失敗一律靜默，不影響測驗 */}
    })();
    return () => {alive = false;};
  }, []);

  // 累積測試人數：完成測驗（進入 result）時 +1，每次載入只加一次
  useEffect(() => {
    if (step === 'result' && !testCountedRef.current) {
      testCountedRef.current = true;
      (async () => {
        try {
          const v = await msCounterRpc('ms_bump_counter', { counter_name: 'tests' });
          if (typeof v === 'number') setSiteStats((s) => s ? { ...s, tests: v } : { tests: v });
        } catch (e) {/* 靜默 */}
      })();
    }
  }, [step]);

  const sortedTypes = () =>
  ['red', 'orange', 'green', 'blue'].
  map((id) => ({ id, ...TYPE_INFO[id] })).
  sort((a, b) => scores[b.id] - scores[a.id]);

  const reset = () => {
    setStep('home');setMode('quiz');setName('');setEmail('');setPhone('');
    setQIdx(0);setAnswers({});setScores({ red: 0, orange: 0, green: 0, blue: 0 });
    setTotal(0);setReferral([]);setRefErr(false);
    setShowSS(false);setShowEng(false);setEngPwd('');setBotTrap('');
    setLookNick('');setLookEmail('');setLookChild('');setLookResult(null);setLookErr('');setLookWho(null);
    setNavDir('fwd');setChildAge(null);setShowShare(false);setCopied(false);
  };

  const doLookup = async () => {
    if (!lookNick.trim()) {setLookErr('請填寫暱稱');return;}
    if (lookWho === 'adult') {
      if (!lookEmail.trim() || !lookEmail.includes('@')) {setLookErr('請填寫有效的家長 Email');return;}
    }
    // 孩子版不需要 Email，後端以「無」作為孩子紀錄的識別
    setLookErr('');
    setLookResult('loading');
    try {
      const emailParam = lookWho === 'adult' ? lookEmail.trim() : '無';
      const url = `${GOOGLE_SCRIPT_URL}?action=lookup&name=${encodeURIComponent(lookNick.trim())}&email=${encodeURIComponent(emailParam)}`;
      const res = await fetch(url);
      const txt = await res.text();
      let data;
      try {data = JSON.parse(txt);} catch (pe) {throw new Error('後端回應格式異常');}
      if (data && data.error) {setLookResult({ error: data.error });return;}
      if (!Array.isArray(data) || data.length === 0) {setLookResult({ error: 'not found' });return;}
      const sortedRecords = [...data].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      setLookResult({ records: sortedRecords });
    } catch (e) {
      setLookResult({ error: '查詢失敗，請檢查網路連線後再試。' });
    }
  };

  const handleRegisterSubmit = (e) => {
    e.preventDefault();

    setStep('quiz');

    if (navigating) return;
    setNav(true);
    setNavDir('fwd');

    setTimeout(() => {
      if (qIdx < QUESTIONS.length - 1) {

    setPhone(testPhone);setAnswers(ta);setTotal(tt);setScores(ts);

    setMode('quiz');setShowEng(false);setEngPwd('');setStep('result');
  };

          style={{ opacity: lookResult === 'loading' ? 0.7 : 1 }}>
                            {lookResult === 'loading' ?
            <><span style={{ display: 'inline-block', width: 16, height: 16, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: '50%', animation: 'spin 0.7s linear infinite' }} /> 查詢中…</> :
            <><Ico.Search /> 立即查詢紀錄</>}
                        </button>
                    </div>
        }

                {/* Error / Not found */}
                {lookResult && lookResult !== 'loading' && lookResult.error &&
        <div className="card" style={{ padding: '28px 22px', textAlign: 'center' }}>
                        <div style={{ width: 64, height: 64, background: 'var(--surface)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px', border: '1.5px solid var(--border)', color: 'var(--text-light)' }}>
                            <Ico.SearchOff />
                        </div>
                        <div style={{ fontSize: 17, fontWeight: 800, color: 'var(--text-dark)', marginBottom: 8 }}>查無紀錄</div>
                        <div style={{ fontSize: 14, color: 'var(--text-mid)', lineHeight: 1.75, marginBottom: 22, whiteSpace: 'pre-line' }}>
                            {lookResult.error === 'missing parameters' || lookResult.error === 'not found' ?
            '找不到符合的測驗紀錄，\n請確認填寫的資料是否正確。' :
            lookResult.error}
                        </div>
                        <button className="btn-outline" onClick={() => setLookResult(null)}>重新查詢</button>
                    </div>
        }

                {/* Success result — array of records */}
                {lookResult && lookResult !== 'loading' && lookResult.records &&
        <div>
                        {/* Header */}
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14, padding: '14px 16px', background: 'var(--green-pale)', borderRadius: 16, border: '1.5px solid #9BE3BF' }}>
                            <div style={{ width: 32, height: 32, background: 'var(--green)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12" /></svg>
                            </div>
                            <div>
                                <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--green)' }}>找到 {lookResult.records.length} 筆紀錄</div>
                                <div style={{ fontSize: 11, color: 'var(--green)', opacity: 0.7, marginTop: 1 }}>依時間由新到舊排列</div>
                            </div>
                        </div>

                        {/* Each record */}
                        {lookResult.records.map((r, i) => {
            const sc = {
              red: Number(r.scores?.red ?? r.red ?? 0),
              orange: Number(r.scores?.orange ?? r.orange ?? 0),
              green: Number(r.scores?.green ?? r.green ?? 0),
              blue: Number(r.scores?.blue ?? r.blue ?? 0)
            };
            const domId = Object.entries(sc).sort((a, b) => b[1] - a[1])[0]?.[0] || 'blue';
            const typeLabel = { red: '開創型（紅）', orange: '關懷型（橙）', green: '協調型（綠）', blue: '分析型（藍）' };
            const typeColor = { red: '#D63030', orange: '#E8600A', green: '#2E8B5A', blue: '#3A70B0' };
            const typeBg = { red: '#FFF0F0', orange: '#FFF0E6', green: '#F0FAF4', blue: '#EEF4FF' };
            return (
              <div key={i} className="card" style={{ marginBottom: 12, padding: '20px', borderTop: `3px solid ${typeColor[domId]}` }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                                        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: typeBg[domId], borderRadius: 20, padding: '4px 12px' }}>
                                            <div style={{ width: 8, height: 8, borderRadius: '50%', background: typeColor[domId] }} />
                                            <span style={{ fontSize: 12, fontWeight: 800, color: typeColor[domId] }}>{typeLabel[domId]}</span>
                                        </div>
                                        <div style={{ fontSize: 11, color: 'var(--text-light)', fontWeight: 600 }}>{r.date || '—'}</div>
                                    </div>
                                    {[
                { key: 'red', label: '開創型（紅）', color: '#D63030' },
                { key: 'orange', label: '關懷型（橙）', color: '#E8600A' },
                { key: 'green', label: '協調型（綠）', color: '#2E8B5A' },
                { key: 'blue', label: '分析型（藍）', color: '#3A70B0' }].
                map((t) =>
                <div key={t.key} style={{ marginBottom: 10 }}>
                                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, marginBottom: 8 }}>
                                                <span style={{ fontSize: 28, fontWeight: 900, color: 'var(--text-dark)' }}>{t.label}</span>
                                                <span style={{ color: t.color, fontVariantNumeric: 'tabular-nums', fontWeight: 900, fontSize: 28 }}>{sc[t.key]}</span>
                                            </div>
                                            <div style={{ height: 12, background: 'var(--surface)', borderRadius: 8, overflow: 'hidden', border: '1px solid var(--border)' }}>
                                                <div style={{ height: '100%', background: `linear-gradient(90deg, ${t.color}99, ${t.color})`, width: `${sc[t.key] / 30 * 100}%`, borderRadius: 8, animation: 'barGrow 1.6s cubic-bezier(.22,.68,0,1.1) both', boxShadow: `inset 0 1px 0 rgba(255,255,255,.35), 0 2px 8px ${t.color}55` }} />
                                            </div>
                                        </div>
                )}
                                </div>);

          })}

                        <button className="btn-outline" onClick={() => {setLookResult(null);setLookWho(null);setLookNick('');setLookEmail('');setLookChild('');}} style={{ marginBottom: 8 }}>
                            再查一筆
                        </button>
                    </div>
        }

                <button onClick={reset} className="btn-ghost"><Ico.ChevronL /> 返回首頁</button>
            </div>

            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </Shell>);


  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
